# XcodeGen project spec. Generate the Xcode project with:
#   brew install xcodegen && cd App && xcodegen generate
name: Facet
options:
  bundleIdPrefix: com.JasonPhillips
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  FacetKit:
    path: ..

# Without an explicit scheme, XcodeGen emits none and every `xcodegen
# generate` wipes the ones Xcode auto-creates — leaving Run with nothing
# to launch. This one is shared (committed), so it survives regeneration.
schemes:
  Facet:
    build:
      targets:
        Facet: all
        FacetWidgets: [run, profile, archive]
    run:
      config: Debug
      # The widget extension is embedded in the app; running the app is
      # always what you want. Never run the extension scheme directly.
      askForAppToLaunch: false
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1

targets:
  Facet:
    type: application
    platform: iOS
    sources:
      - Facet
      - Shared
    dependencies:
      - package: FacetKit
        products: [FacetCore, FacetData, FacetRender, FacetTemplates]
      - target: FacetWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.JasonPhillips.app
        CODE_SIGN_ENTITLEMENTS: Facet/Facet.entitlements
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Facet
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Facet uses your location to show local weather in your widgets.
        INFOPLIST_KEY_NSHealthShareUsageDescription: Facet reads steps, energy, and stand hours to show them in your widgets.
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: Facet reads your calendar to show upcoming events in your widgets.
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: Facet reads your reminders to show due counts and the next item in your widgets.
        INFOPLIST_KEY_NSFocusStatusUsageDescription: Facet reads whether a Focus is active to show it in your widgets.

  FacetWidgets:
    type: app-extension
    platform: iOS
    sources:
      - FacetWidgets
      - Shared
    dependencies:
      - package: FacetKit
        products: [FacetCore, FacetData, FacetRender, FacetTemplates]
    info:
      path: FacetWidgets/Info.plist
      properties:
        CFBundleDisplayName: Facet Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.JasonPhillips.app.widgets
        CODE_SIGN_ENTITLEMENTS: FacetWidgets/FacetWidgets.entitlements
