name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux-tests:
    name: Swift tests (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test --skip-build
      - name: Render templates (smoke)
        run: |
          swift run facet-preview list
          swift run facet-preview render "Battery Ring" --scheme dark --out /tmp/battery.svg
          test -s /tmp/battery.svg
